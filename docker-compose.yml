services:
  postgres:
    image: postgres:16-alpine
    container_name: elite-fitness-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: elite_fitness
      POSTGRES_USER: elite
      POSTGRES_PASSWORD: elite
    ports:
      - "5432:5432"
    volumes:
      - elite_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U elite -d elite_fitness"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    env_file: .env
    ports:
      - "4000:4000"
    depends_on:
      postgres:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: docker/web.Dockerfile
    environment:
      NEXT_PUBLIC_API_URL: "http://localhost:4000/api/v1"
    ports:
      - "3000:3000"
    depends_on:
      - api

volumes:
  elite_postgres:
